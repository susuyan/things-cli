name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/things

      - name: Generate SHA256
        run: shasum -a 256 target/release/things > things-macos.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Things CLI ${{ github.ref_name }}

            ### Installation

            Download the binary for macOS:
            ```bash
            curl -L -o things https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/things-macos
            chmod +x things
            sudo mv things /usr/local/bin/
            ```

            Or build from source:
            ```bash
            cargo install --git https://github.com/${{ github.repository }}.git --tag ${{ github.ref_name }}
            ```
          files: |
            target/release/things#things-macos
            things-macos.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
